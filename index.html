<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Rewards</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #4CAF50; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #45a049; }
        #message { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎁 แอปตารางรับรางวัล</h1>
    <p>กรอกหมายเลขกระเป๋า BNB เพื่อเช็คอินรับแต้ม</p>
    
    <input type="text" id="walletInput" placeholder="ใส่หมายเลขกระเป๋าเงิน (Wallet Address)...">
    <button onclick="handleCheckIn()">กดเช็คอินรับแต้ม (+10 แต้ม)</button>
    
    <div id="message"></div>
</div>

<script>
    async function handleCheckIn() {
        const walletAddress = document.getElementById('walletInput').value.trim();
        const messageDiv = document.getElementById('message');
        
        if (!walletAddress) {
            messageDiv.style.color = '#ff9800';
            messageDiv.innerText = '⚠️ กรุณากรอกหมายเลขกระเป๋าเงินก่อนครับ';
            return;
        }
        
        messageDiv.style.color = '#cbd5e1';
        messageDiv.innerText = '⏳ กำลังบันทึกข้อมูลและส่งอีเมลแจ้งเตือน...';
        
        try {
            // เรียกไปที่หลังบ้านในโปรเจกต์เดียวกันโดยตรง
            const response = await fetch('/api/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ walletAddress: walletAddress })
            });
            
            const data = await response.json();
            
            if (data.success) {
                messageDiv.style.color = '#4CAF50';
                messageDiv.innerText = '🎉 ' + data.message;
            } else {
                messageDiv.style.color = '#f44336';
                messageDiv.innerText = '❌ ' + data.message;
            }
        } catch (error) {
            console.error('Error:', error);
            messageDiv.style.color = '#f44336';
            messageDiv.innerText = '❌ เกิดข้อผิดพลาดในระบบ แต่แต้มอาจจะถูกบันทึกแล้ว';
        }
    }
</script>

</body>
</html>
