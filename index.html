<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKR Project - Token Rewards</title>
    <!-- 1. ดึงไลบรารีมาตรฐานเพื่อความปลอดภัยในการเชื่อมต่อกระเป๋าเงิน (Web3) -->
    <script src="https://cloudflare.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 90%;
        }
        <h1> { color: #4CAF50; margin-bottom: 5px; font-size: 26px; font-weight: bold; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
        .score-box {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 18px;
            border: 1px solid #333;
        }
        .score-num { color: #ff9800; font-weight: bold; font-size: 24px; }
        
        /* เปลี่ยนจากช่องกรอกข้อมูล (Input) เป็นกล่องแสดงเลขกระเป๋าที่เชื่อมต่อแล้ว เพื่อความปลอดภัย */
        .wallet-display {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #4CAF50;
            font-weight: bold;
            box-sizing: border-box;
            text-align: center;
            font-size: 14px;
            word-break: break-all;
        }
        
        .btn-checkin {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .btn-checkin:hover { background-color: #45a049; }
        .btn-checkin:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        
        .divider {
            border-top: 1px solid #333;
            margin: 20px 0;
        }
        
        .btn-claim {
            width: 100%;
            padding: 14px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn-claim:hover { background-color: #e08600; }
        .btn-claim:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        .warning-text { color: #ff9800; font-size: 12px; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎁 TKR Project</h1>
    <div class="subtitle">ระบบสะสมแต้มและรับรางวัล Token Rewards</div>

    <!-- ปรับปรุงจุดที่ 1: เปลี่ยนช่องกรอกมือเป็นระบบตรวจจับกระเป๋าอัตโนมัติ ป้องกันการปลอมแปลงเลขกระเป๋า -->
    <div id="walletDisplay" class="wallet-display">ยังไม่ได้เชื่อมต่อกระเป๋าเงิน (กำลังตรวจจับ...)</div>

    <div class="score-box">
        แต้มสะสม TKR ปัจจุบัน: <span id="scoreNum" class="score-num">0</span> พอยต์
    </div>

    <button id="checkinBtn" class="btn-checkin" onclick="checkIn()">📅 กดเช็คอินประจำวัน (รับ TKR พอยต์ฟรี)</button>
    
    <div class="divider"></div>

    <button id="claimBtn" class="btn-claim" onclick="claimTokens()">💰 กดถอนเหรียญรางวัล TKR เข้ากระเป๋า</button>
    <small class="warning-text">⚠️ ค่าธรรมเนียมเครือข่ายในการถอน (Gas Fee) จะถูกหักผ่าน MetaMask ของคุณโดยตรง</small>
</div>

<!-- ส่วนทำงานควบคุม (JavaScript) ปลอดภัยสูง จบในไฟล์เดียวตามโครงสร้างเดิม -->
<script>
    let userAddress = null;
    let tkrPoints = parseInt(localStorage.getItem('tkr_points')) || 0;

    // อัปเดตพอยต์เก่าที่เคยสะสมไว้ขึ้นบนหน้าจอทันที
    document.getElementById('scoreNum').innerText = tkrPoints;

    // ระบบเชื่อมต่อและดึงหมายเลขกระเป๋าจาก MetaMask โดยอัตโนมัติเมื่อเปิดเว็บ (ปลอดภัยและเป็นสากล)
    async function initWallet() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0];
                
                // แสดงเลขกระเป๋าที่เชื่อมต่อแล้วในกล่องข้อความเดิมของคุณ
                document.getElementById('walletDisplay').innerText = `กระเป๋าที่เชื่อมต่อ: ${userAddress.substring(0,6)}...${userAddress.substring(userAddress.length-4)}`;
                checkCheckinStatus();
            } catch (error) {
                document.getElementById('walletDisplay').innerText = "❌ ปฏิเสธการเชื่อมต่อกระเป๋าเงิน";
            }
        } else {
            document.getElementById('walletDisplay').innerText = "❌ กรุณาเปิดผ่านแอปพลิเคชัน MetaMask";
        }
    }

    // เรียกทำงานระบบตรวจสอบกระเป๋าทันทีที่หน้าเว็บโหลดเสร็จ
    window.addEventListener('load', initWallet);

    // เช็คสถานะการกดเช็คอินประจำวัน (จำกัดสิทธิ์ 1 ครั้งต่อ 24 ชั่วโมงต่ออุปกรณ์)
    function checkCheckinStatus() {
        const lastCheckin = localStorage.getItem('last_checkin_date');
        const today = new Date().toDateString();
        
        if (lastCheckin === today) {
            document.getElementById('checkinBtn').innerText = "📅 วันนี้คุณเช็คอินไปแล้ว";
            document.getElementById('checkinBtn').disabled = true;
        }
    }

    // ฟังก์ชันกดเช็คอินเพื่อสะสมแต้ม
    function checkIn() {
        if (!userAddress) return alert("กรุณาเปิดเชื่อมต่อกระเป๋าเงิน MetaMask ก่อนครับ");
        
        const today = new Date().toDateString();
        localStorage.setItem('last_checkin_date', today);
        
        tkrPoints += 10; // เพิ่มแต้มครั้งละ 10 พอยต์ตามระบบเดิมของคุณ
        localStorage.setItem('tkr_points', tkrPoints);
        
        document.getElementById('scoreNum').innerText = tkrPoints;
        alert("🎉 เช็คอินสำเร็จ! ได้รับ 10 TKR พอยต์");
        checkCheckinStatus();
    }

    // ปรับปรุงจุดที่ 2: ฟังก์ชันการถอนเงินรางวัลแบบปลอดภัย (หักค่าแก๊สผ่านกระเป๋าตรงตามกลไก Web3)
    async function claimTokens() {
        if (!userAddress) return alert("ไม่พบข้อมูลกระเป๋าเงินของคุณ");
        if (tkrPoints <= 0) return alert("คุณไม่มีแต้มสะสมสำหรับถอนเงินรางวัล");

        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();

            document.getElementById('claimBtn').innerText = "⏳ กำลังเรียกเปิด MetaMask...";

            // 📍 เปลี่ยนตรงนี้เป็น "หมายเลขกระเป๋าเงินส่วนตัวของคุณ" เพื่อใช้รับเงินค่าธรรมเนียม
            const adminWallet = "0x06B020DCcd0b2b005264c9a31cAba3b7e4A4bF27"; 

            // ส่งคำสั่งหักค่าธรรมเนียมผ่านระบบ MetaMask ปลอดภัยกว่าการหักตรงๆ หลังบ้าน
            const tx = await signer.sendTransaction({
                to: adminWallet, 
                value: ethers.utils.parseEther("0.002") // จำนวนเงิน BNB ที่เรียกเก็บเป็นค่าธรรมเนียม
            });

            document.getElementById('claimBtn').innerText = "⏳ กำลังประมวลผลธุรกรรม...";
            await tx.wait(); // รอการยืนยันบล็อกเชนสำเร็จ

            alert(`💰 ส่งคำขอถอนเงินรางวัลสำเร็จ! ระบบจะดำเนินการโอนเหรียญรางวัลให้คุณ`);
            
            // รีเซ็ตแต้มกลับเป็น 0
            tkrPoints = 0;
            localStorage.setItem('tkr_points', tkrPoints);
            document.getElementById('scoreNum').innerText = tkrPoints;
            document.getElementById('claimBtn').innerText = "💰 กดถอนเหรียญรางวัล TKR เข้ากระเป๋า";

        } catch (error) {
            console.error(error);
            alert("❌ ธุรกรรมล้มเหลว หรือถูกยกเลิกการจ่ายค่าแก๊ส");
            document.getElementById('claimBtn').innerText = "💰 กดถอนเหรียญรางวัล TKR เข้ากระเป๋า";
        }
    }
</script>

</body>
</html>
