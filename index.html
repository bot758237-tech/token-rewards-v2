    async function connectWallet() {
        const log = document.getElementById('terminalLog');
        const btn = document.getElementById('connectWalletBtn');
        
        if (typeof window.ethereum !== 'undefined') {
            try {
                log.innerText = "⏳ Requesting permissions from MetaMask...";
                
                // คำสั่งส่งคำขอเชื่อมต่อกระเป๋าจริงสไตล์มาตรฐานสากล
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                
                // ปรับแสดงหน้าตาปุ่มและที่อยู่เมื่อเชื่อมต่อสำเร็จ
                document.getElementById('walletDisplay').innerText = "💳 " + userAddress;
                btn.innerText = "✅ Wallet Connected";
                btn.style.background = "linear-gradient(90deg, #10b981, #059669)";
                
                // โหลดเงินคงเหลือในกระเป๋าของลูกค้ามาโชว์จริง
                const balance = await provider.getBalance(userAddress);
                const bnbVal = parseFloat(ethers.utils.formatEther(balance)).toFixed(4);
                document.getElementById('bnbBalance').innerText = bnbVal + " BNB";
                document.getElementById('totalUSD').innerText = "$" + (bnbVal * 400).toFixed(2);
                
                log.innerText = "🟢 Connected! Wallet synchronized successfully.";
            } catch (error) {
                console.error(error);
                log.innerText = "❌ Connection rejected by the user.";
            }
        } else {
            // กรณีเปิดนอกแอปคริปโต บังคับดึงแอป MetaMask ขึ้นมาทำงาน
            log.innerText = "⏳ Opening MetaMask app for secure connection...";
            const currentUrl = window.location.href.replace('https://', '').replace('http://', '');
            window.location.href = "https://app.link" + currentUrl;
        }
    }
